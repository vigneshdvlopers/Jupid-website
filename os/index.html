                                <h2 className="font-h2 text-h2 text-on-surface mb-md">Ready to outpace the competition?</h2>
                                <p className="font-body-lg text-body-lg text-on-surface/70 max-w-xl mx-auto mb-lg">
                                    Join the elite agencies and brands using Jupid AI to secure their market dominance.
                                </p>
                                <button className="bg-primary text-on-primary px-xl py-md rounded-full font-bold text-lg hover:opacity-90 active:scale-95 transition-all shadow-[0_0_20px_rgba(63,229,108,0.2)]">
                                    Start Free Trial
                                </button>
                            </div>
                        </div>
                    </section>
                </main>
            );
        };

        const ContactPage = () => {
            return (
                <main className="flex-grow pt-[120px] pb-xl relative">
                    <style>{`
                        .contact-bg {
                            background-image: 
                                radial-gradient(circle at 50% -20%, #3fe56c15 0%, transparent 50%),
                                linear-gradient(#ffffff03 1px, transparent 1px),
                                linear-gradient(90deg, #ffffff03 1px, transparent 1px);
                            background-size: 100% 100%, 64px 64px, 64px 64px;
                        }
                    `}</style>
                    <div className="max-w-[1200px] mx-auto px-margin mt-xl">
                        <div className="mb-xl text-center md:text-left max-w-2xl">
                            <h1 className="font-h1 text-h1 mb-md">Let's Talk</h1>
                            <p className="font-body-lg text-body-lg text-on-surface/70">Interested in Jupid AI? Reach out and let's discuss how our intelligent insights can transform your digital future.</p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-lg items-start">
                            <div className="lg:col-span-8 glass-card rounded-xl p-lg md:p-xl">
                                <form className="space-y-lg" onSubmit={(e) => e.preventDefault()}>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-lg">
                                        <div className="flex flex-col gap-xs">
                                            <label className="font-label-caps text-label-caps text-on-surface/60 uppercase tracking-widest">Name</label>
                                            <input className="bg-surface-container-lowest border border-white/10 rounded-lg px-md py-sm text-on-surface focus:outline-none focus:border-primary transition-colors w-full" placeholder="John Doe" type="text" />
                                        </div>
                                        <div className="flex flex-col gap-xs">
                                            <label className="font-label-caps text-label-caps text-on-surface/60 uppercase tracking-widest">Email</label>
                                            <input className="bg-surface-container-lowest border border-white/10 rounded-lg px-md py-sm text-on-surface focus:outline-none focus:border-primary transition-colors w-full" placeholder="john@example.com" type="email" />
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-xs">
                                        <label className="font-label-caps text-label-caps text-on-surface/60 uppercase tracking-widest">Company</label>
                                        <input className="bg-surface-container-lowest border border-white/10 rounded-lg px-md py-sm text-on-surface focus:outline-none focus:border-primary transition-colors w-full" placeholder="Acme Corp" type="text" />
                                    </div>
                                    <div className="flex flex-col gap-xs">
                                        <label className="font-label-caps text-label-caps text-on-surface/60 uppercase tracking-widest">Message</label>
                                        <textarea className="bg-surface-container-lowest border border-white/10 rounded-lg px-md py-sm text-on-surface focus:outline-none focus:border-primary transition-colors w-full resize-none" placeholder="How can we help you?" rows="5"></textarea>
                                    </div>
                                    <div className="pt-md">
                                        <button className="w-full md:w-auto bg-primary-container text-on-primary font-bold py-md px-xl rounded-full shadow-[0_0_20px_rgba(0,200,83,0.3)] hover:shadow-[0_0_30px_rgba(0,200,83,0.5)] transition-all duration-300 active:scale-95">
                                            Send Message
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <div className="lg:col-span-4 space-y-lg">
                                <div className="glass-card rounded-xl p-lg flex flex-col gap-md">
                                    <div className="flex items-center gap-md">
                                        <div className="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
                                            <span className="material-symbols-outlined text-primary">mail</span>
                                        </div>
                                        <div>
                                            <p className="font-label-caps text-label-caps text-on-surface/60 uppercase">Email Us</p>
                                            <p className="font-h3 text-h3 text-primary text-[1.2rem]">ofuslast553@gmail.com</p>
                                        </div>
                                    </div>
                                    <div className="pt-md border-t border-white/10">
                                        <p className="text-on-surface/70 leading-relaxed text-sm">Our team of experts is ready to help you navigate the AI landscape. Expect a response within 24 hours.</p>
                                    </div>
                                </div>
                                <div className="glass-card rounded-xl p-lg relative overflow-hidden h-64">
                                    <img className="absolute inset-0 w-full h-full object-cover opacity-30 grayscale hover:grayscale-0 transition-all duration-700" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBeu6Ju5MGsteLzR3VPuc6FL8ohxmaKAsyQwTCMB-vdJ21bayiAsugXb_TznbAUepetnrQ32AhSW4wUPVzPxY0DRL7zyGvUTyJacXKjK96QUa-0z4HLGWaR7dkqtCGk0IG9nZWMJDuBQcDyf_4rU-jZwo_i0hbVdoxDiYqurqw-WaLWdEjifkym9vMFLn2o47-9odI-vfCk_JfFXnPiBE6H6SwQk6h7K9RzgQFMboPxSjUp2ZghmhmEl_-Z4tEqGTZPdcVI_TfRIcN-" alt="Global Network Map" />
                                    <div className="relative z-10">
                                        <p className="font-label-caps text-label-caps text-on-surface/60 uppercase">Global Headquarters</p>
                                        <p className="font-h3 text-h3 mt-sm">Mumbai, India</p>
                                    </div>
                                    <div className="absolute bottom-4 right-4 z-10">
                                        <span className="material-symbols-outlined text-primary text-4xl animate-pulse">location_on</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            );
        };

        // --- Main App Wrapper ---

        const App = () => {
            const { pathname } = useLocation();

            // Scroll to top on route change
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [pathname]);

            return (
                <div className="min-h-screen flex flex-col bg-surface overflow-x-hidden">
                    <Navigation />
                    <Routes>
                        <Route path="/" element={<HomePage />} />
                        <Route path="/about" element={<AboutPage />} />
                        <Route path="/contact" element={<ContactPage />} />
                    </Routes>
                    <Footer />
                </div>
            );
        };

        // --- Entry Point ---

        const rootElement = document.getElementById("root");
        const root = createRoot(rootElement);
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>

</html>
